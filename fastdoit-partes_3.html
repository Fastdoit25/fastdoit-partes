<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FASTDOIT · Parte Diario</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --amarillo: #F5A623;
    --negro: #1A1A1A;
    --gris-claro: #F2F2F2;
    --gris-medio: #CCCCCC;
    --verde: #2ECC71;
    --rojo: #E74C3C;
    --blanco: #FFFFFF;
  }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--negro);
    color: var(--blanco);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* CABECERA */
  header {
    background: var(--amarillo);
    padding: 18px 20px 14px;
    text-align: center;
  }
  header h1 {
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--negro);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  header p {
    font-size: 0.85rem;
    color: var(--negro);
    opacity: 0.7;
    margin-top: 2px;
  }

  /* VISTAS */
  .vista { display: none; flex-direction: column; flex: 1; padding: 20px 16px 40px; }
  .vista.activa { display: flex; }

  /* FORMULARIO TRABAJADOR */
  .campo { margin-bottom: 20px; }
  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--amarillo);
    margin-bottom: 8px;
  }
  select, input[type="number"], input[type="date"] {
    width: 100%;
    padding: 16px 14px;
    font-size: 1.15rem;
    border: 2px solid #333;
    border-radius: 10px;
    background: #2A2A2A;
    color: var(--blanco);
    appearance: none;
    -webkit-appearance: none;
    outline: none;
  }
  select:focus, input:focus {
    border-color: var(--amarillo);
  }
  select option { background: #2A2A2A; }

  /* Flecha select */
  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '▼';
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: var(--amarillo);
    font-size: 0.9rem;
  }

  /* BOTÓN ENVIAR */
  .btn-enviar {
    width: 100%;
    padding: 20px;
    font-size: 1.3rem;
    font-weight: 800;
    background: var(--amarillo);
    color: var(--negro);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 10px;
    transition: opacity 0.2s;
  }
  .btn-enviar:active { opacity: 0.8; }
  .btn-enviar:disabled { opacity: 0.4; cursor: not-allowed; }

  /* CONFIRMACIÓN */
  .confirmacion {
    display: none;
    text-align: center;
    padding: 40px 20px;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .confirmacion.visible { display: flex; }
  .icono-ok {
    width: 80px;
    height: 80px;
    background: var(--verde);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
  }
  .confirmacion h2 { font-size: 1.5rem; }
  .confirmacion p { color: var(--gris-medio); line-height: 1.5; }
  .btn-nuevo {
    padding: 14px 30px;
    background: transparent;
    border: 2px solid var(--amarillo);
    color: var(--amarillo);
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 10px;
  }

  /* ERROR */
  .msg-error {
    display: none;
    background: var(--rojo);
    color: white;
    padding: 12px 16px;
    border-radius: 8px;
    margin-top: 12px;
    font-size: 0.95rem;
    text-align: center;
  }
  .msg-error.visible { display: block; }

  /* ENLACE ADMIN */
  .footer-admin {
    text-align: center;
    padding: 16px;
    font-size: 0.75rem;
    color: #555;
  }
  .footer-admin a { color: #666; text-decoration: none; }

  /* PANEL ADMIN */
  .admin-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .btn-volver {
    background: transparent;
    border: 1px solid #444;
    color: var(--gris-medio);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
  }
  .admin-header h2 { font-size: 1.2rem; color: var(--amarillo); }

  /* LOGIN ADMIN */
  .login-box {
    background: #2A2A2A;
    border-radius: 12px;
    padding: 28px 20px;
    max-width: 360px;
    margin: 0 auto;
  }
  .login-box h3 { margin-bottom: 16px; font-size: 1.1rem; color: var(--amarillo); }
  .login-box input[type="password"] {
    width: 100%;
    padding: 14px;
    font-size: 1.1rem;
    border: 2px solid #444;
    border-radius: 8px;
    background: #1A1A1A;
    color: white;
    outline: none;
    margin-bottom: 12px;
  }
  .login-box input[type="password"]:focus { border-color: var(--amarillo); }
  .btn-login {
    width: 100%;
    padding: 14px;
    background: var(--amarillo);
    color: var(--negro);
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
  }
  .login-error { color: var(--rojo); font-size: 0.85rem; margin-top: 8px; display: none; }

  /* TABLA REGISTROS */
  .filtros {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .filtros select, .filtros input {
    flex: 1;
    min-width: 140px;
    padding: 10px 12px;
    font-size: 0.9rem;
    border: 1px solid #444;
    border-radius: 8px;
    background: #2A2A2A;
    color: white;
  }
  .resumen {
    background: #2A2A2A;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 16px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }
  .resumen-item { display: flex; flex-direction: column; }
  .resumen-item span:first-child { font-size: 0.7rem; color: #888; text-transform: uppercase; }
  .resumen-item span:last-child { font-size: 1.4rem; font-weight: 700; color: var(--amarillo); }

  .tabla-scroll { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
    min-width: 520px;
  }
  th {
    background: #2A2A2A;
    padding: 10px 12px;
    text-align: left;
    color: var(--amarillo);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  td {
    padding: 12px;
    border-bottom: 1px solid #2A2A2A;
    color: #DDD;
  }
  tr:hover td { background: #1E1E1E; }
  .horas-badge {
    background: var(--amarillo);
    color: var(--negro);
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 700;
    font-size: 0.8rem;
  }
  .sin-datos {
    text-align: center;
    padding: 40px;
    color: #555;
    font-size: 0.95rem;
  }

  .cargando { text-align: center; padding: 30px; color: #888; font-size: 0.9rem; }

  /* CAMPO CON X */
  .field-wrap { position: relative; }
  .field-wrap input {
    width: 100%;
    padding: 16px 44px 16px 14px;
    font-size: 1.15rem;
    border: 2px solid #333;
    border-radius: 10px;
    background: #2A2A2A;
    color: var(--blanco);
    outline: none;
  }
  .field-wrap input:focus { border-color: var(--amarillo); }
  .btn-clear {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: #444;
    border: none;
    color: #ccc;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 0.75rem;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .btn-clear:hover { background: #666; color: white; }

  /* ACOMPAÑANTES */
  .acomp-lista { margin-top: 10px; display: flex; flex-direction: column; gap: 10px; }
  .acomp-item {
    background: #222;
    border: 1px solid #333;
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: relative;
  }
  .acomp-item .acomp-nombre {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--amarillo);
  }
  .acomp-item .acomp-horas-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .acomp-item .acomp-horas-wrap label {
    font-size: 0.8rem;
    color: #aaa;
    text-transform: none;
    letter-spacing: 0;
    margin: 0;
    white-space: nowrap;
  }
  .acomp-item input[type="number"] {
    width: 90px;
    padding: 8px 10px;
    font-size: 1rem;
    border: 1px solid #444;
    border-radius: 8px;
    background: #2A2A2A;
    color: white;
  }
  .btn-quitar-acomp {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #333;
    border: none;
    color: #aaa;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 0.7rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn-quitar-acomp:hover { background: var(--rojo); color: white; }
  .btn-añadir-acomp {
    width: 100%;
    padding: 13px;
    background: transparent;
    border: 2px dashed #444;
    border-radius: 10px;
    color: #888;
    font-size: 0.95rem;
    cursor: pointer;
    margin-top: 4px;
    transition: all 0.2s;
  }
  .btn-añadir-acomp:hover { border-color: var(--amarillo); color: var(--amarillo); }
  .acomp-selector {
    background: #222;
    border: 2px solid var(--amarillo);
    border-radius: 10px;
    padding: 12px 14px;
    display: none;
    flex-direction: column;
    gap: 8px;
    margin-top: 4px;
  }
  .acomp-selector.visible { display: flex; }
  .acomp-selector .field-wrap input {
    font-size: 1rem;
    padding: 12px 40px 12px 12px;
  }
  .acomp-selector .acomp-horas-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .acomp-selector .acomp-horas-row label {
    font-size: 0.85rem;
    color: #aaa;
    text-transform: none;
    letter-spacing: 0;
    margin: 0;
    white-space: nowrap;
  }
  .acomp-selector .acomp-horas-row input {
    width: 90px;
    padding: 10px;
    font-size: 1rem;
    border: 1px solid #444;
    border-radius: 8px;
    background: #2A2A2A;
    color: white;
  }
  .btn-confirmar-acomp {
    padding: 10px;
    background: var(--amarillo);
    color: var(--negro);
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
  }
  .btn-cancelar-acomp {
    padding: 10px;
    background: transparent;
    color: #888;
    border: 1px solid #444;
    border-radius: 8px;
    font-size: 0.95rem;
    cursor: pointer;
  }

  /* BUSCADOR NOMBRES */
  .buscador-wrap { position: relative; }
  .buscador-wrap input[type="text"] {
    width: 100%;
    padding: 16px 14px;
    font-size: 1.15rem;
    border: 2px solid #333;
    border-radius: 10px;
    background: #2A2A2A;
    color: var(--blanco);
    outline: none;
  }
  .buscador-wrap input[type="text"]:focus { border-color: var(--amarillo); }
  .nombre-lista {
    display: none;
    position: absolute;
    top: 100%;
    left: 0; right: 0;
    background: #2A2A2A;
    border: 2px solid var(--amarillo);
    border-top: none;
    border-radius: 0 0 10px 10px;
    max-height: 220px;
    overflow-y: auto;
    z-index: 100;
  }
  .nombre-lista.visible { display: block; }
  .nombre-item {
    padding: 14px 16px;
    font-size: 1rem;
    cursor: pointer;
    border-bottom: 1px solid #333;
    color: var(--blanco);
  }
  .nombre-item:last-child { border-bottom: none; }
  .nombre-item:hover, .nombre-item.seleccionado { background: #3A3A3A; color: var(--amarillo); }

  .btn-exportar {
    padding: 10px 18px;
    background: transparent;
    border: 1px solid var(--amarillo);
    color: var(--amarillo);
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    margin-left: auto;
    display: block;
    margin-bottom: 12px;
  }
</style>
</head>
<body>

<header>
  <h1>FASTDOIT</h1>
  <p id="fecha-header"></p>
</header>

<!-- VISTA TRABAJADOR -->
<div class="vista activa" id="vista-trabajador">

  <div id="form-contenido">
    <div class="campo">
      <label>Tu nombre</label>
      <div class="field-wrap">
        <input type="text" id="nombre" list="lista-nombres" placeholder="Escribe tu nombre..." autocomplete="off" oninput="syncClear('nombre','btn-clear-nombre')" style="padding-right:44px">
        <datalist id="lista-nombres"></datalist>
        <button class="btn-clear" id="btn-clear-nombre" onclick="clearField('nombre','btn-clear-nombre')" style="display:none">✕</button>
      </div>
    </div>

    <div class="campo">
      <label>Fecha</label>
      <input type="date" id="fecha">
    </div>

    <div class="campo">
      <label>Obra</label>
      <div class="field-wrap">
        <input type="text" id="obra" list="lista-obras" placeholder="Escribe o busca la obra..." autocomplete="off" oninput="syncClear('obra','btn-clear-obra')" style="padding-right:44px">
        <datalist id="lista-obras">
          <option>AUSENCIA</option>
          <option>BECSA LOS NARANJOS</option>
          <option>BECSA MONTSERRAT</option>
          <option>BECSA TORRENTE</option>
          <option>BERTOLIN AQ CAMPO OLIVAR</option>
          <option>BERTOLIN HOTEL AZOR BENICASSIM</option>
          <option>BERTOLIN JYSK ALMENARA</option>
          <option>BLAUVERD ALZIRA</option>
          <option>BLAUVERD PATERNA</option>
          <option>BLAUVERD PICASSENT</option>
          <option>BLAUVERD SAN ANTONIO BENAJEBER</option>
          <option>DOC CENTRO DE SALUD</option>
          <option>DOC MISLATA</option>
          <option>DOC TURISMO</option>
          <option>FERROVIAL OROPESA</option>
          <option>OBRA MªDOLORES CAMPILLO DE DUEÑAS</option>
          <option>OBRA PUÇOL RUBÉN VAQUERO</option>
          <option>PIRAVALLS FAURA</option>
          <option>PIRAVALLS MONCADA</option>
          <option>REVISAR</option>
          <option>URBIALBA AVDA PUERTO</option>
          <option>UTE FERROVIAL MONCOFAR</option>
          <option>VACACIONES</option>
          <option>VEOLIA ALAQUÁS</option>
          <option>VEOLIA REQUENA</option>
          <option>VEOLIA CABANYAL</option>
          <option>VEOLIA CARLET</option>
          <option>VEOLIA PATERNA</option>
          <option>VEOLIA SAGUNTO</option>
          <option>VEOLIA SENYERA</option>
        </datalist>
        <button class="btn-clear" id="btn-clear-obra" onclick="clearField('obra','btn-clear-obra')" style="display:none">✕</button>
      </div>
    </div>

    <div class="campo">
      <label>Horas trabajadas</label>
      <input type="number" id="horas" min="0.5" max="24" step="0.5" placeholder="Ej: 8">
    </div>

    <!-- ACOMPAÑANTES -->
    <div class="campo">
      <label>Acompañantes <span style="font-weight:400;color:#888;text-transform:none">(opcional)</span></label>
      <div id="acomp-lista" class="acomp-lista"></div>

      <!-- Selector para añadir acompañante -->
      <div class="acomp-selector" id="acomp-selector">
        <div class="field-wrap">
          <input type="text" id="acomp-nombre-input" list="lista-nombres-acomp" placeholder="Nombre del acompañante..." autocomplete="off" oninput="syncClear('acomp-nombre-input','btn-clear-acomp')" style="padding-right:44px">
          <datalist id="lista-nombres-acomp"></datalist>
          <button class="btn-clear" id="btn-clear-acomp" onclick="clearField('acomp-nombre-input','btn-clear-acomp')" style="display:none">✕</button>
        </div>
        <div class="acomp-horas-row">
          <label>Horas:</label>
          <input type="number" id="acomp-horas-input" min="0.5" max="24" step="0.5" placeholder="8">
        </div>
        <button class="btn-confirmar-acomp" onclick="confirmarAcomp()">+ Añadir</button>
        <button class="btn-cancelar-acomp" onclick="cerrarSelectorAcomp()">Cancelar</button>
      </div>

      <button class="btn-añadir-acomp" id="btn-añadir-acomp" onclick="abrirSelectorAcomp()">+ Añadir acompañante</button>
    </div>

    <button class="btn-enviar" id="btn-enviar" onclick="enviarParte()">
      ✓ Enviar parte
    </button>

    <div class="msg-error" id="msg-error">Rellena todos los campos antes de enviar.</div>
  </div>

  <!-- CONFIRMACIÓN -->
  <div class="confirmacion" id="confirmacion">
    <div class="icono-ok">✓</div>
    <h2>¡Parte enviado!</h2>
    <p id="resumen-enviado"></p>
    <button class="btn-nuevo" onclick="nuevoRegistro()">Enviar otro parte</button>
  </div>

</div>

<!-- VISTA ADMIN -->
<div class="vista" id="vista-admin">
  <div class="admin-header">
    <button class="btn-volver" onclick="volverInicio()">← Volver</button>
    <h2>Panel de administración</h2>
  </div>

  <!-- LOGIN -->
  <div id="login-admin">
    <div class="login-box">
      <h3>🔒 Acceso restringido</h3>
      <input type="password" id="password-admin" placeholder="Contraseña" onkeydown="if(event.key==='Enter')loginAdmin()">
      <button class="btn-login" onclick="loginAdmin()">Entrar</button>
      <div class="login-error" id="login-error">Contraseña incorrecta</div>
    </div>
  </div>

  <!-- PANEL DATOS -->
  <div id="panel-datos" style="display:none">
    <div class="filtros">
      <input type="date" id="filtro-desde" onchange="renderTabla()">
      <input type="date" id="filtro-hasta" onchange="renderTabla()">
      <div class="select-wrap" style="flex:1;min-width:140px">
        <select id="filtro-obra" onchange="renderTabla()">
          <option value="">Todas las obras</option>
          <option>AUSENCIA</option>
          <option>BECSA LOS NARANJOS</option>
          <option>BECSA MONTSERRAT</option>
          <option>BECSA TORRENTE</option>
          <option>BERTOLIN AQ CAMPO OLIVAR</option>
          <option>BERTOLIN HOTEL AZOR BENICASSIM</option>
          <option>BERTOLIN JYSK ALMENARA</option>
          <option>BLAUVERD ALZIRA</option>
          <option>BLAUVERD PATERNA</option>
          <option>BLAUVERD PICASSENT</option>
          <option>BLAUVERD SAN ANTONIO BENAJEBER</option>
          <option>DOC CENTRO DE SALUD</option>
          <option>DOC MISLATA</option>
          <option>DOC TURISMO</option>
          <option>FERROVIAL OROPESA</option>
          <option>OBRA MªDOLORES CAMPILLO DE DUEÑAS</option>
          <option>OBRA PUÇOL RUBÉN VAQUERO</option>
          <option>PIRAVALLS FAURA</option>
          <option>PIRAVALLS MONCADA</option>
          <option>REVISAR</option>
          <option>URBIALBA AVDA PUERTO</option>
          <option>UTE FERROVIAL MONCOFAR</option>
          <option>VACACIONES</option>
          <option>VEOLIA ALAQUÁS</option>
          <option>VEOLIA REQUENA</option>
          <option>VEOLIA CABANYAL</option>
          <option>VEOLIA CARLET</option>
          <option>VEOLIA PATERNA</option>
          <option>VEOLIA SAGUNTO</option>
          <option>VEOLIA SENYERA</option>
        </select>
      </div>
    </div>

    <div class="resumen">
      <div class="resumen-item">
        <span>Registros</span>
        <span id="stat-registros">—</span>
      </div>
      <div class="resumen-item">
        <span>Total horas</span>
        <span id="stat-horas">—</span>
      </div>
      <div class="resumen-item">
        <span>Trabajadores</span>
        <span id="stat-trabajadores">—</span>
      </div>
    </div>

    <button class="btn-exportar" onclick="exportarCSV()">⬇ Exportar CSV</button>

    <div class="tabla-scroll">
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Trabajador</th>
            <th>Obra</th>
            <th>Horas</th>
          </tr>
        </thead>
        <tbody id="tabla-body"></tbody>
      </table>
    </div>
    <div class="cargando" id="cargando-datos" style="display:none">Cargando datos...</div>
    <div class="sin-datos" id="sin-datos" style="display:none">No hay registros con estos filtros.</div>
  </div>
</div>

<div class="footer-admin">
  <a href="#" onclick="irAdmin(); return false;">Administración</a>
</div>

<script>
// ════════════════════════════════════════════════
// CONFIGURACIÓN — edita estas dos líneas
// ════════════════════════════════════════════════
const SHEET_URL = "https://script.google.com/macros/s/AKfycbxP24GKXSKZO8NEdpKhvaGcWB3lW0WYYQCb9UcIIyVJ-xG4nXhkikq02dhL2iag2e4eCA/exec";
const ADMIN_PASS = "fastdoit2025";

// Lista de trabajadores — añade o quita según necesites

let registrosCacheados = [];

// Inicialización
window.onload = () => {
  // Fecha de hoy
  const hoy = new Date();
  const pad = n => String(n).padStart(2,'0');
  const fechaISO = `${hoy.getFullYear()}-${pad(hoy.getMonth()+1)}-${pad(hoy.getDate())}`;
  document.getElementById('fecha').value = fechaISO;
  document.getElementById('fecha-header').textContent = hoy.toLocaleDateString('es-ES', {weekday:'long', day:'numeric', month:'long'});

  // Poblar datalist de trabajadores
  const dl = document.getElementById('lista-nombres');
  TRABAJADORES.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t;
    dl.appendChild(opt);
  });

  // Poblar datalist de acompañantes (misma lista)
  const dl2 = document.getElementById('lista-nombres-acomp');
  TRABAJADORES.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t;
    dl2.appendChild(opt);
  });

  // Guardar último trabajador seleccionado
  const ultimo = localStorage.getItem('ultimo_trabajador');
  if (ultimo) {
    document.getElementById('nombre').value = ultimo;
    syncClear('nombre', 'btn-clear-nombre');
  }

  // Guardar última obra seleccionada
  const ultimaObra = localStorage.getItem('ultima_obra');
  if (ultimaObra) {
    document.getElementById('obra').value = ultimaObra;
    syncClear('obra', 'btn-clear-obra');
  }
};

// ─── BUSCADOR NOMBRES ───────────────────────────
function renderListaNombres(lista) {
  const div = document.getElementById('nombre-lista');
  div.innerHTML = '';
  if (lista.length === 0) {
    div.innerHTML = '<div class="nombre-item" style="color:#888">No encontrado</div>';
  } else {
    lista.forEach(t => {
      const item = document.createElement('div');
      item.className = 'nombre-item';
      if (t === document.getElementById('nombre').value) item.classList.add('seleccionado');
      item.textContent = t;
      item.addEventListener('mousedown', () => seleccionarNombre(t));
      div.appendChild(item);
    });
  }
}

function filtrarNombres() {
  const q = document.getElementById('nombre-buscar').value.toUpperCase();
  const filtrados = TRABAJADORES.filter(t => t.toUpperCase().includes(q));
  renderListaNombres(filtrados);
  document.getElementById('nombre-lista').classList.add('visible');
  if (!q) document.getElementById('nombre').value = '';
}

function mostrarLista() {
  const q = document.getElementById('nombre-buscar').value.toUpperCase();
  const filtrados = TRABAJADORES.filter(t => t.toUpperCase().includes(q));
  renderListaNombres(filtrados);
  document.getElementById('nombre-lista').classList.add('visible');
}

function ocultarLista() {
  setTimeout(() => {
    document.getElementById('nombre-lista').classList.remove('visible');
  }, 200);
}

function seleccionarNombre(nombre) {
  document.getElementById('nombre').value = nombre;
  document.getElementById('nombre-buscar').value = nombre;
  document.getElementById('nombre-lista').classList.remove('visible');
}

// ─── ACOMPAÑANTES ───────────────────────────────
let acompañantes = [];

function abrirSelectorAcomp() {
  document.getElementById('acomp-selector').classList.add('visible');
  document.getElementById('btn-añadir-acomp').style.display = 'none';
  document.getElementById('acomp-nombre-input').value = '';
  document.getElementById('acomp-horas-input').value = '';
  document.getElementById('btn-clear-acomp').style.display = 'none';
  document.getElementById('acomp-nombre-input').focus();
}

function cerrarSelectorAcomp() {
  document.getElementById('acomp-selector').classList.remove('visible');
  document.getElementById('btn-añadir-acomp').style.display = 'block';
}

function confirmarAcomp() {
  const nombre = document.getElementById('acomp-nombre-input').value.trim();
  const horas = document.getElementById('acomp-horas-input').value;
  if (!nombre || !horas) {
    alert('Indica el nombre y las horas del acompañante');
    return;
  }
  acompañantes.push({ nombre, horas: parseFloat(horas) });
  renderAcompañantes();
  cerrarSelectorAcomp();
}

function renderAcompañantes() {
  const lista = document.getElementById('acomp-lista');
  lista.innerHTML = '';
  acompañantes.forEach((a, i) => {
    const div = document.createElement('div');
    div.className = 'acomp-item';
    div.innerHTML = `
      <div class="acomp-nombre">👷 ${a.nombre}</div>
      <div class="acomp-horas-wrap">
        <label>Horas:</label>
        <input type="number" min="0.5" max="24" step="0.5" value="${a.horas}" onchange="acompañantes[${i}].horas=parseFloat(this.value)">
      </div>
      <button class="btn-quitar-acomp" onclick="quitarAcomp(${i})">✕</button>
    `;
    lista.appendChild(div);
  });
}

function quitarAcomp(i) {
  acompañantes.splice(i, 1);
  renderAcompañantes();
}

// ─── CAMPO CON X ────────────────────────────────
function syncClear(fieldId, btnId) {
  const val = document.getElementById(fieldId).value;
  document.getElementById(btnId).style.display = val ? 'flex' : 'none';
}

function clearField(fieldId, btnId) {
  document.getElementById(fieldId).value = '';
  document.getElementById(btnId).style.display = 'none';
  document.getElementById(fieldId).focus();
}

// ─── PARTE TRABAJADOR ───────────────────────────
function enviarParte() {
  const nombre = document.getElementById('nombre').value;
  const fecha  = document.getElementById('fecha').value;
  const obra   = document.getElementById('obra').value;
  const horas  = document.getElementById('horas').value;

  const err = document.getElementById('msg-error');

  if (!nombre || !fecha || !obra || !horas) {
    err.classList.add('visible');
    return;
  }
  err.classList.remove('visible');

  const btn = document.getElementById('btn-enviar');
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  localStorage.setItem('ultimo_trabajador', nombre);
  localStorage.setItem('ultima_obra', obra);
  syncClear('nombre', 'btn-clear-nombre');

  // Construir array de filas: trabajador principal + acompañantes
  const filas = [{ nombre, fecha, obra, horas: parseFloat(horas) }];
  acompañantes.forEach(a => filas.push({ nombre: a.nombre, fecha, obra, horas: a.horas }));

  const mostrarConfirmacion = () => {
    document.getElementById('form-contenido').style.display = 'none';
    document.getElementById('confirmacion').classList.add('visible');
    const fechaLeg = new Date(fecha + 'T12:00:00').toLocaleDateString('es-ES', {day:'numeric', month:'long'});
    const total = filas.length;
    document.getElementById('resumen-enviado').textContent =
      `${total} registro${total>1?'s':''} enviado${total>1?'s':''} · ${fechaLeg} · ${obra}`;
  };

  // Enviar todas las filas
  Promise.allSettled(filas.map(datos =>
    fetch(SHEET_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(datos)
    })
  )).then(mostrarConfirmacion).catch(mostrarConfirmacion);
}

function nuevoRegistro() {
  document.getElementById('confirmacion').classList.remove('visible');
  document.getElementById('form-contenido').style.display = '';
  document.getElementById('obra').value = '';
  document.getElementById('horas').value = '';
  document.getElementById('btn-enviar').disabled = false;
  document.getElementById('btn-enviar').textContent = '✓ Enviar parte';
  acompañantes = [];
  renderAcompañantes();
  cerrarSelectorAcomp();
}

// ─── PANEL ADMIN ────────────────────────────────
function irAdmin() {
  document.getElementById('vista-trabajador').classList.remove('activa');
  document.getElementById('vista-admin').classList.add('activa');
}

function volverInicio() {
  document.getElementById('vista-admin').classList.remove('activa');
  document.getElementById('vista-trabajador').classList.add('activa');
}

function loginAdmin() {
  const pass = document.getElementById('password-admin').value;
  const errEl = document.getElementById('login-error');
  if (pass === ADMIN_PASS) {
    document.getElementById('login-admin').style.display = 'none';
    document.getElementById('panel-datos').style.display = 'block';
    cargarDatos();
  } else {
    errEl.style.display = 'block';
  }
}

function cargarDatos() {
  document.getElementById('cargando-datos').style.display = 'block';
  fetch(SHEET_URL + '?action=leer')
    .then(r => r.json())
    .then(data => {
      registrosCacheados = data;
      document.getElementById('cargando-datos').style.display = 'none';
      renderTabla();
    })
    .catch(() => {
      document.getElementById('cargando-datos').textContent = 'Error al cargar datos. Comprueba la URL del script.';
    });
}

function renderTabla() {
  const desde = document.getElementById('filtro-desde').value;
  const hasta = document.getElementById('filtro-hasta').value;
  const obra  = document.getElementById('filtro-obra').value;

  let datos = [...registrosCacheados];
  if (desde) datos = datos.filter(r => r.fecha >= desde);
  if (hasta) datos = datos.filter(r => r.fecha <= hasta);
  if (obra)  datos = datos.filter(r => r.obra === obra);

  // Ordenar por fecha desc
  datos.sort((a,b) => b.fecha.localeCompare(a.fecha));

  const tbody = document.getElementById('tabla-body');
  tbody.innerHTML = '';

  if (datos.length === 0) {
    document.getElementById('sin-datos').style.display = 'block';
  } else {
    document.getElementById('sin-datos').style.display = 'none';
    datos.forEach(r => {
      const tr = document.createElement('tr');
      const fechaLeg = new Date(r.fecha + 'T12:00:00').toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit', year:'numeric'});
      tr.innerHTML = `
        <td>${fechaLeg}</td>
        <td>${r.nombre}</td>
        <td>${r.obra}</td>
        <td><span class="horas-badge">${r.horas}h</span></td>
      `;
      tbody.appendChild(tr);
    });
  }

  // Stats
  const totalHoras = datos.reduce((s,r) => s + parseFloat(r.horas||0), 0);
  const trabajadores = new Set(datos.map(r=>r.nombre)).size;
  document.getElementById('stat-registros').textContent = datos.length;
  document.getElementById('stat-horas').textContent = totalHoras % 1 === 0 ? totalHoras : totalHoras.toFixed(1);
  document.getElementById('stat-trabajadores').textContent = trabajadores;
}

function exportarCSV() {
  const desde = document.getElementById('filtro-desde').value;
  const hasta = document.getElementById('filtro-hasta').value;
  const obra  = document.getElementById('filtro-obra').value;

  let datos = [...registrosCacheados];
  if (desde) datos = datos.filter(r => r.fecha >= desde);
  if (hasta) datos = datos.filter(r => r.fecha <= hasta);
  if (obra)  datos = datos.filter(r => r.obra === obra);
  datos.sort((a,b) => b.fecha.localeCompare(a.fecha));

  let csv = 'Fecha;Trabajador;Obra;Horas\n';
  datos.forEach(r => {
    csv += `${r.fecha};${r.nombre};${r.obra};${r.horas}\n`;
  });

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `partes_fastdoit_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
