<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FASTDOIT · Parte Diario</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --amarillo: #F5A623;
    --negro: #1A1A1A;
    --gris-claro: #F2F2F2;
    --gris-medio: #CCCCCC;
    --verde: #2ECC71;
    --rojo: #E74C3C;
    --blanco: #FFFFFF;
  }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--negro);
    color: var(--blanco);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* CABECERA */
  header {
    background: var(--amarillo);
    padding: 18px 20px 14px;
    text-align: center;
  }
  header h1 {
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--negro);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  header p {
    font-size: 0.85rem;
    color: var(--negro);
    opacity: 0.7;
    margin-top: 2px;
  }

  /* VISTAS */
  .vista { display: none; flex-direction: column; flex: 1; padding: 20px 16px 40px; }
  .vista.activa { display: flex; }

  /* FORMULARIO TRABAJADOR */
  .campo { margin-bottom: 20px; }
  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--amarillo);
    margin-bottom: 8px;
  }
  select, input[type="number"], input[type="date"] {
    width: 100%;
    padding: 16px 14px;
    font-size: 1.15rem;
    border: 2px solid #333;
    border-radius: 10px;
    background: #2A2A2A;
    color: var(--blanco);
    appearance: none;
    -webkit-appearance: none;
    outline: none;
  }
  select:focus, input:focus {
    border-color: var(--amarillo);
  }
  select option { background: #2A2A2A; }

  /* Flecha select */
  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '▼';
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: var(--amarillo);
    font-size: 0.9rem;
  }

  /* BOTÓN ENVIAR */
  .btn-enviar {
    width: 100%;
    padding: 20px;
    font-size: 1.3rem;
    font-weight: 800;
    background: var(--amarillo);
    color: var(--negro);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 10px;
    transition: opacity 0.2s;
  }
  .btn-enviar:active { opacity: 0.8; }
  .btn-enviar:disabled { opacity: 0.4; cursor: not-allowed; }

  /* CONFIRMACIÓN */
  .confirmacion {
    display: none;
    text-align: center;
    padding: 40px 20px;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .confirmacion.visible { display: flex; }
  .icono-ok {
    width: 80px;
    height: 80px;
    background: var(--verde);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
  }
  .confirmacion h2 { font-size: 1.5rem; }
  .confirmacion p { color: var(--gris-medio); line-height: 1.5; }
  .btn-nuevo {
    padding: 14px 30px;
    background: transparent;
    border: 2px solid var(--amarillo);
    color: var(--amarillo);
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 10px;
  }

  /* ERROR */
  .msg-error {
    display: none;
    background: var(--rojo);
    color: white;
    padding: 12px 16px;
    border-radius: 8px;
    margin-top: 12px;
    font-size: 0.95rem;
    text-align: center;
  }
  .msg-error.visible { display: block; }

  /* ENLACE ADMIN */
  .footer-admin {
    text-align: center;
    padding: 16px;
    font-size: 0.75rem;
    color: #555;
  }
  .footer-admin a { color: #666; text-decoration: none; }

  /* PANEL ADMIN */
  .admin-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .btn-volver {
    background: transparent;
    border: 1px solid #444;
    color: var(--gris-medio);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
  }
  .admin-header h2 { font-size: 1.2rem; color: var(--amarillo); }

  /* LOGIN ADMIN */
  .login-box {
    background: #2A2A2A;
    border-radius: 12px;
    padding: 28px 20px;
    max-width: 360px;
    margin: 0 auto;
  }
  .login-box h3 { margin-bottom: 16px; font-size: 1.1rem; color: var(--amarillo); }
  .login-box input[type="password"] {
    width: 100%;
    padding: 14px;
    font-size: 1.1rem;
    border: 2px solid #444;
    border-radius: 8px;
    background: #1A1A1A;
    color: white;
    outline: none;
    margin-bottom: 12px;
  }
  .login-box input[type="password"]:focus { border-color: var(--amarillo); }
  .btn-login {
    width: 100%;
    padding: 14px;
    background: var(--amarillo);
    color: var(--negro);
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
  }
  .login-error { color: var(--rojo); font-size: 0.85rem; margin-top: 8px; display: none; }

  /* TABLA REGISTROS */
  .filtros {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .filtros select, .filtros input {
    flex: 1;
    min-width: 140px;
    padding: 10px 12px;
    font-size: 0.9rem;
    border: 1px solid #444;
    border-radius: 8px;
    background: #2A2A2A;
    color: white;
  }
  .resumen {
    background: #2A2A2A;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 16px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }
  .resumen-item { display: flex; flex-direction: column; }
  .resumen-item span:first-child { font-size: 0.7rem; color: #888; text-transform: uppercase; }
  .resumen-item span:last-child { font-size: 1.4rem; font-weight: 700; color: var(--amarillo); }

  .tabla-scroll { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
    min-width: 520px;
  }
  th {
    background: #2A2A2A;
    padding: 10px 12px;
    text-align: left;
    color: var(--amarillo);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  td {
    padding: 12px;
    border-bottom: 1px solid #2A2A2A;
    color: #DDD;
  }
  tr:hover td { background: #1E1E1E; }
  .horas-badge {
    background: var(--amarillo);
    color: var(--negro);
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 700;
    font-size: 0.8rem;
  }
  .sin-datos {
    text-align: center;
    padding: 40px;
    color: #555;
    font-size: 0.95rem;
  }

  .cargando { text-align: center; padding: 30px; color: #888; font-size: 0.9rem; }

  /* BUSCADOR NOMBRES */
  .buscador-wrap { position: relative; }
  .buscador-wrap input[type="text"] {
    width: 100%;
    padding: 16px 14px;
    font-size: 1.15rem;
    border: 2px solid #333;
    border-radius: 10px;
    background: #2A2A2A;
    color: var(--blanco);
    outline: none;
  }
  .buscador-wrap input[type="text"]:focus { border-color: var(--amarillo); }
  .nombre-lista {
    display: none;
    position: absolute;
    top: 100%;
    left: 0; right: 0;
    background: #2A2A2A;
    border: 2px solid var(--amarillo);
    border-top: none;
    border-radius: 0 0 10px 10px;
    max-height: 220px;
    overflow-y: auto;
    z-index: 100;
  }
  .nombre-lista.visible { display: block; }
  .nombre-item {
    padding: 14px 16px;
    font-size: 1rem;
    cursor: pointer;
    border-bottom: 1px solid #333;
    color: var(--blanco);
  }
  .nombre-item:last-child { border-bottom: none; }
  .nombre-item:hover, .nombre-item.seleccionado { background: #3A3A3A; color: var(--amarillo); }

  .btn-exportar {
    padding: 10px 18px;
    background: transparent;
    border: 1px solid var(--amarillo);
    color: var(--amarillo);
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    margin-left: auto;
    display: block;
    margin-bottom: 12px;
  }
</style>
</head>
<body>

<header>
  <h1>FASTDOIT</h1>
  <p id="fecha-header"></p>
</header>

<!-- VISTA TRABAJADOR -->
<div class="vista activa" id="vista-trabajador">

</div>

<!-- VISTA ADMIN -->
<div class="vista" id="vista-admin">
  <div class="admin-header">
    <button class="btn-volver" onclick="volverInicio()">← Volver</button>
    <h2>Panel de administración</h2>

  <!-- LOGIN -->
  <div id="login-admin">

      <h3>🔒 Acceso restringido</h3>

      <div class="login-error" id="login-error">Contraseña incorrecta</div>

  </div>

  <!-- PANEL DATOS -->
  <div id="panel-datos" style="display:none">
    <div class="filtros">
      <input type="date" id="filtro-desde" onchange="renderTabla()">

      <div class="select-wrap" style="flex:1;min-width:140px">
        <select id="filtro-obra" onchange="renderTabla()">
          <option value="">Todas las obras</option>
          <option>BECSA LOS NARANJOS</option>
          <option>BECSA MONTSERRAT</option>
          <option>BECSA TORRENTE</option>
          <option>BERTOLIN AQ CAMPO OLIVAR</option>
          <option>BERTOLIN HOTEL AZOR BENICASSIM</option>
          <option>BERTOLIN JYSK ALMENARA</option>
          <option>BLAUVERD ALZIRA</option>
          <option>BLAUVERD PATERNA</option>
          <option>BLAUVERD PATERNA (LEGRAF)</option>
          <option>BLAUVERD PICASSENT</option>
          <option>BLAUVERD SAN ANTONIO BENAJEBER</option>
          <option>DOC EDIFICIO TURISMO</option>
          <option>DOC MISLATA</option>

    <div class="resumen">

    <button class="btn-exportar" onclick="exportarCSV()">⬇ Exportar CSV</button>

  </div>
</div>

<div class="footer-admin">
  <a href="#" onclick="irAdmin(); return false;">Administración</a>
</div>

<script>
// ════════════════════════════════════════════════
// CONFIGURACIÓN — edita estas dos líneas
// ════════════════════════════════════════════════
const SHEET_URL = "https://script.google.com/macros/s/AKfycbxP24GKXSKZO8NEdpKhvaGcWB3lW0WYYQCb9UcIIyVJ-xG4nXhkikq02dhL2iag2e4eCA/exec";
const ADMIN_PASS = "fastdoit2025";

// Lista de trabajadores — añade o quita según necesites
const TRABAJADORES = [
  "CHERKAOUI, MASKANI",
  "COULIBALY AMADOU",
  "CRISTIAN RODRÍGO ALZATE TREJOS",
  "DANDJO, HAMADY",
  "DIA SERIGNE",
  "DIABATE, SORY BAH",
  "DIABATE, SOUALIHO",
  "DIAGNE, BABA",
  "DIALLO, AMADOU",
  "DIAMERA GANGA",
  "DIARRA, ABOUDOU",
  "DIARRA, ZOUMANA",
  "DICKO YAYA",
  "DIOM, BADOU",
  "DIOUF CHEIKH, TIDIANE",
  "DIOUF, DOUDOU",
  "DJIBY, SOW",
  "DOUMBIA, ISMAEL",
  "DOUMBOUYA BARRY, ABDOUL KARIM",
  "DRAME, SOULEYMANE",
  "DUEÑAS DELGADO, WILLIAMS",
  "FALL MOUHAMMED",
  "FAYE, OUSSEYNOU",
  "GASPARD OLIVIER, D´ANGELO",
  "GUZMÁN PÉREZ, CLARA",
  "IBRA MAR",
  "JAITEH, KAWSU",
  "JUAN FERNANDEZ, CARLOS ROLAND",
  "JUAN FERNÁNDEZ, JOSÉ MANUEL",
  "JULIO CÉSAR BARRIOS ESPRIELLA",
  "KEITA, SOULEYMANE",
  "LEFRAGH, ABDELKRIM",
  "LEÓN RIVERA, LUIS ABEL",
  "LO SAME",
  "LÓPEZ OLMEDO, VICTOR",
  "MARADI, ABDOULAYE",
  "MASKANI, BOUABID",
  "MASSAR BA",
  "MATLOOB, MUHAMMAD",
  "MBOUP MODOU",
  "MEHDHI, NAQASH",
  "MONTAGUD MARTÍNEZ, RAFAEL",
  "MORATA CASTELLÓ, SARA",
  "NACHAT, AHMED",
  "NDIAYE, LAMINE",
  "NDIAYE, MANDIAYE",
  "NDIONE, SOULEYMANE",
  "NIJE, SAMBA",
  "OUMAR DIENG",
  "RODRÍGUEZ NAVARRETE, DAVID",
  "SAKHO, IBRAHIMA",
  "SALIOU DIOUF",
  "SECK, AMADOU",
  "SERMINOS VARGAS, LUIS",
  "SIDEBEH, KEBBE",
  "SIDIBE, MAMADOU",
  "SILLAH, MUHAMMED",
  "SISSOKO, SARRA",
  "SORO, YACOUBA",
  "SY, MALICK",
  "TAHIRI, HAMID",
  "TAMSIR, THIAM",
  "TOUBI, ABDELATIF",
  "TOURAY, BABOUCARR",
  "TRAORE, HAMALLA",
  "TRAORE, NOUHOM",
  "VICENTE GUZTAVO TITO ANGAMARCA"
];
// ════════════════════════════════════════════════

let registrosCacheados = [];

// Inicialización
window.onload = () => {
  // Fecha de hoy
  const hoy = new Date();
  const pad = n => String(n).padStart(2,'0');
  const fechaISO = `${hoy.getFullYear()}-${pad(hoy.getMonth()+1)}-${pad(hoy.getDate())}`;
  document.getElementById('fecha').value = fechaISO;
  document.getElementById('fecha-header').textContent = hoy.toLocaleDateString('es-ES', {weekday:'long', day:'numeric', month:'long'});

  // Guardar último trabajador seleccionado
  const ultimo = localStorage.getItem('ultimo_trabajador');
  if (ultimo) {
    document.getElementById('nombre').value = ultimo;
    document.getElementById('nombre-buscar').value = ultimo;
  }
  renderListaNombres(TRABAJADORES);
};

// ─── BUSCADOR NOMBRES ───────────────────────────
function renderListaNombres(lista) {
  const div = document.getElementById('nombre-lista');
  div.innerHTML = '';
  if (lista.length === 0) {
    div.innerHTML = '<div class="nombre-item" style="color:#888">No encontrado</div>';
  } else {
    lista.forEach(t => {
      const item = document.createElement('div');
      item.className = 'nombre-item';
      if (t === document.getElementById('nombre').value) item.classList.add('seleccionado');
      item.textContent = t;
      item.addEventListener('mousedown', () => seleccionarNombre(t));
      div.appendChild(item);
    });
  }
}

function filtrarNombres() {
  const q = document.getElementById('nombre-buscar').value.toUpperCase();
  const filtrados = TRABAJADORES.filter(t => t.toUpperCase().includes(q));
  renderListaNombres(filtrados);
  document.getElementById('nombre-lista').classList.add('visible');
  if (!q) document.getElementById('nombre').value = '';
}

function mostrarLista() {
  const q = document.getElementById('nombre-buscar').value.toUpperCase();
  const filtrados = TRABAJADORES.filter(t => t.toUpperCase().includes(q));
  renderListaNombres(filtrados);
  document.getElementById('nombre-lista').classList.add('visible');
}

function ocultarLista() {
  setTimeout(() => {
    document.getElementById('nombre-lista').classList.remove('visible');
  }, 200);
}

function seleccionarNombre(nombre) {
  document.getElementById('nombre').value = nombre;
  document.getElementById('nombre-buscar').value = nombre;
  document.getElementById('nombre-lista').classList.remove('visible');
}

// ─── PARTE TRABAJADOR ───────────────────────────
function enviarParte() {
  const nombre = document.getElementById('nombre').value;
  const fecha  = document.getElementById('fecha').value;
  const obra   = document.getElementById('obra').value;
  const horas  = document.getElementById('horas').value;

  const err = document.getElementById('msg-error');

  if (!nombre || !fecha || !obra || !horas) {
    err.classList.add('visible');
    return;
  }
  err.classList.remove('visible');

  const btn = document.getElementById('btn-enviar');
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  localStorage.setItem('ultimo_trabajador', nombre);

  const datos = { nombre, fecha, obra, horas: parseFloat(horas) };

  fetch(SHEET_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(datos)
  })
  .then(() => {
    document.getElementById('form-contenido').style.display = 'none';
    const conf = document.getElementById('confirmacion');
    conf.classList.add('visible');
    const fechaLeg = new Date(fecha + 'T12:00:00').toLocaleDateString('es-ES', {day:'numeric', month:'long'});
    document.getElementById('resumen-enviado').textContent =
      `${nombre} · ${fechaLeg} · ${obra} · ${horas}h`;
  })
  .catch(() => {
    // Con mode: no-cors siempre cae aquí aunque funcione; mostramos confirmación igualmente
    document.getElementById('form-contenido').style.display = 'none';
    document.getElementById('confirmacion').classList.add('visible');
    const fechaLeg = new Date(fecha + 'T12:00:00').toLocaleDateString('es-ES', {day:'numeric', month:'long'});
    document.getElementById('resumen-enviado').textContent =
      `${nombre} · ${fechaLeg} · ${obra} · ${horas}h`;
  });
}

function nuevoRegistro() {
  document.getElementById('confirmacion').classList.remove('visible');
  document.getElementById('form-contenido').style.display = '';
  document.getElementById('obra').value = '';
  document.getElementById('horas').value = '';
  document.getElementById('btn-enviar').disabled = false;
  document.getElementById('btn-enviar').textContent = '✓ Enviar parte';
}

// ─── PANEL ADMIN ────────────────────────────────
function irAdmin() {
  document.getElementById('vista-trabajador').classList.remove('activa');
  document.getElementById('vista-admin').classList.add('activa');
}

function volverInicio() {
  document.getElementById('vista-admin').classList.remove('activa');
  document.getElementById('vista-trabajador').classList.add('activa');
}

function loginAdmin() {
  const pass = document.getElementById('password-admin').value;
  const errEl = document.getElementById('login-error');
  if (pass === ADMIN_PASS) {
    document.getElementById('login-admin').style.display = 'none';
    document.getElementById('panel-datos').style.display = 'block';
    cargarDatos();
  } else {
    errEl.style.display = 'block';
  }
}

function cargarDatos() {
  document.getElementById('cargando-datos').style.display = 'block';
  fetch(SHEET_URL + '?action=leer')
    .then(r => r.json())
    .then(data => {
      registrosCacheados = data;
      document.getElementById('cargando-datos').style.display = 'none';
      renderTabla();
    })
    .catch(() => {
      document.getElementById('cargando-datos').textContent = 'Error al cargar datos. Comprueba la URL del script.';
    });
}

function renderTabla() {
  const desde = document.getElementById('filtro-desde').value;
  const hasta = document.getElementById('filtro-hasta').value;
  const obra  = document.getElementById('filtro-obra').value;

  let datos = [...registrosCacheados];
  if (desde) datos = datos.filter(r => r.fecha >= desde);
  if (hasta) datos = datos.filter(r => r.fecha <= hasta);
  if (obra)  datos = datos.filter(r => r.obra === obra);

  // Ordenar por fecha desc
  datos.sort((a,b) => b.fecha.localeCompare(a.fecha));

  const tbody = document.getElementById('tabla-body');
  tbody.innerHTML = '';

  if (datos.length === 0) {
    document.getElementById('sin-datos').style.display = 'block';
  } else {
    document.getElementById('sin-datos').style.display = 'none';
    datos.forEach(r => {
      const tr = document.createElement('tr');
      const fechaLeg = new Date(r.fecha + 'T12:00:00').toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit', year:'numeric'});
      tr.innerHTML = `
        <td>${fechaLeg}</td>
        <td>${r.nombre}</td>
        <td>${r.obra}</td>
        <td><span class="horas-badge">${r.horas}h</span></td>
      `;
      tbody.appendChild(tr);
    });
  }

  // Stats
  const totalHoras = datos.reduce((s,r) => s + parseFloat(r.horas||0), 0);
  const trabajadores = new Set(datos.map(r=>r.nombre)).size;
  document.getElementById('stat-registros').textContent = datos.length;
  document.getElementById('stat-horas').textContent = totalHoras % 1 === 0 ? totalHoras : totalHoras.toFixed(1);
  document.getElementById('stat-trabajadores').textContent = trabajadores;
}

function exportarCSV() {
  const desde = document.getElementById('filtro-desde').value;
  const hasta = document.getElementById('filtro-hasta').value;
  const obra  = document.getElementById('filtro-obra').value;

  let datos = [...registrosCacheados];
  if (desde) datos = datos.filter(r => r.fecha >= desde);
  if (hasta) datos = datos.filter(r => r.fecha <= hasta);
  if (obra)  datos = datos.filter(r => r.obra === obra);
  datos.sort((a,b) => b.fecha.localeCompare(a.fecha));

  let csv = 'Fecha;Trabajador;Obra;Horas\n';
  datos.forEach(r => {
    csv += `${r.fecha};${r.nombre};${r.obra};${r.horas}\n`;
  });

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `partes_fastdoit_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
</script>
